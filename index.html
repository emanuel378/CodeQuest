<!doctype html>
<html class="dark" lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cidade da Lógica - Protocolo Autômato</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div id="root"></div>

    <template id="page-game">
      <div class="game-container">
        <header class="top-navbar">
          <a class="nav-logo" data-action="home" href="#">CodeQuest</a>
          <div class="nav-brand">
            <h1 class="app-title">
              <span class="level-indicator">Nível 0: Tutorial</span>
            </h1>
          </div>
          <button class="menu-toggle" data-action="toggle-menu" title="Menu">
            <span class="material-symbols-outlined">menu</span>
          </button>

          <div class="game-drawer-overlay" data-drawer></div>

          <aside class="game-drawer" data-drawer>
            <div class="game-drawer-header">
              <div class="game-drawer-header-row">
                <div class="drawer-profile" id="drawer-profile">
                  <span class="drawer-profile-avatar" id="drawer-profile-avatar">?</span>
                  <div class="drawer-profile-info">
                    <span class="drawer-profile-name" id="drawer-profile-name">Sem perfil</span>
                    <span class="drawer-profile-xp" id="drawer-profile-xp">0 XP</span>
                  </div>
                  <span class="material-symbols-outlined drawer-profile-arrow" id="drawer-profile-arrow">expand_more</span>
                </div>
              </div>
              <div class="drawer-profile-options" id="drawer-profile-options">
                <button class="drawer-profile-option" data-drawer-action="add-player">
                  <span class="material-symbols-outlined">person_add</span>
                  Adicionar Jogador
                </button>
                <button class="drawer-profile-option" data-drawer-action="list-players">
                  <span class="material-symbols-outlined">group</span>
                  Jogadores Já Cadastrados
                </button>
              </div>
            </div>
            <div class="nav-controls">
              <button class="btn-mute" data-action="mute" title="Alternar som">
                <span class="material-symbols-outlined">volume_up</span>
                <span class="btn-label">Música</span>
              </button>
              <button class="btn-mute" data-action="glossary" title="Glossário">
                <span class="material-symbols-outlined">menu_book</span>
                <span class="btn-label">Glossário</span>
              </button>
              <div class="progress-container">
                <div class="progress-labels">
                  <span>Integridade do Sistema</span>
                  <span>0%</span>
                </div>
                <div class="progress-track">
                  <div class="progress-fill"></div>
                </div>
              </div>
              <div class="star-rating">
                <span class="difficulty-label">DIFICULDADE</span>
                <div class="star-icons">
                  <span class="material-symbols-outlined">star</span>
                  <span class="material-symbols-outlined">star</span>
                  <span class="material-symbols-outlined">star</span>
                </div>
              </div>
            </div>
          </aside>
        </header>

        <main class="sb-layout">
          <aside class="sb-palette" id="palette"></aside>
          <div class="sb-workspace" id="workspace" tabindex="0">
            <div class="sb-zoom-controls">
              <button class="btn-zoom" data-zoom="out" title="Afastar">
                <span class="material-symbols-outlined">zoom_out</span>
              </button>
              <span class="sb-zoom-level">100%</span>
              <button class="btn-zoom" data-zoom="in" title="Aproximar">
                <span class="material-symbols-outlined">zoom_in</span>
              </button>
              <div class="sb-zoom-divider"></div>
              <button class="btn-zoom" data-zoom="fit" title="Redefinir zoom">
                <span class="material-symbols-outlined">fit_screen</span>
              </button>
            </div>
          </div>
          <aside class="simulation-panel">
            <div class="sim-header">
              <h3 class="sim-title">Palco de Simulação</h3>
              <span class="status-chip">
                <span class="status-dot"></span>
                <span class="status-text">Pronto</span>
              </span>
            </div>
            <div class="sim-attributes" id="attributes-panel"></div>
            <div class="sim-viewport">
              <div class="sim-enemy-info" id="enemy-info"></div>
              <div class="sim-glow-overlay"></div>
              <div class="sim-grid"></div>
            </div>
            <div class="sim-controls">
              <button class="btn-executar">
                <span
                  class="material-symbols-outlined"
                  style="font-variation-settings: &quot;FILL&quot; 1"
                  >play_arrow</span
                >
                EXECUTAR
              </button>
              <button class="btn-pausar">
                <span
                  class="material-symbols-outlined"
                  style="font-variation-settings: &quot;FILL&quot; 1"
                  >pause</span
                >
                PAUSAR
              </button>
              <button class="btn-limpar">
                <span class="material-symbols-outlined">restart_alt</span>
                LIMPAR
              </button>
            </div>
          </aside>
        </main>
        <nav class="mobile-nav">
          <button class="mobile-nav-tab active" data-tab="workspace" type="button">
            <span class="material-symbols-outlined">code_blocks</span>
            <span>Workspace</span>
          </button>
          <button class="mobile-nav-tab" data-tab="simulation" type="button">
            <span class="material-symbols-outlined">play_circle</span>
            <span>Simulação</span>
          </button>
          <button class="mobile-nav-tab" data-tab="attributes" type="button">
            <span class="material-symbols-outlined">equalizer</span>
            <span>Atributos</span>
            <span class="mobile-nav-tab-badge">0</span>
          </button>
        </nav>
      </div>
    </template>

    <template id="page-landing">
      <div class="landing-page">
        <header class="lp-header">
          <div class="lp-logo">CodeQuest</div>
          <nav class="lp-nav">
            <div class="nav-controls"></div>
          </nav>
        </header>

        <main class="lp-hero">
          <div class="lp-badge">
            <span class="lp-badge-dot"></span>
            <span class="lp-badge-text">Sistema Operacional Online</span>
          </div>

          <h1 class="lp-title">CodeQuest</h1>

          <p class="lp-description">
            CodeQuest é um RPG de lógica baseado em blocos onde o jogador
            programa ações de um herói para superar desafios. Mergulhe na rede e
            domine os algoritmos.
          </p>

          <div class="lp-hero-actions">
            <button class="lp-cta" data-action="continue" disabled>
              <svg
                class="lp-cta-icon"
                viewBox="0 0 24 24"
                fill="currentColor"
                stroke="none">
                <polygon points="6 3 20 12 6 21 6 3" />
              </svg>
              Continuar
            </button>
            <button class="lp-cta-outline" data-action="select-level">
              <span class="material-symbols-outlined" style="font-size: 24px"
                >grid_view</span
              >
              Selecionar Nível
            </button>
          </div>

          <div class="lp-bar">
            <div class="lp-bar-segment lp-bar-cyan"></div>
            <div class="lp-bar-segment lp-bar-purple"></div>
            <div class="lp-bar-segment lp-bar-green"></div>
          </div>
        </main>

        <footer class="lp-footer">
          <span class="lp-footer-text">CodeQuest</span>
        </footer>
      </div>
    </template>

    <template id="page-ranking">
      <div class="ranking-page">
        <nav class="rank-navbar">
          <div class="rank-nav-inner">
            <a class="rank-logo" data-action="home" href="#">CodeQuest</a>
            <div class="rank-nav-right">
              <div class="nav-controls"></div>
              <button class="rank-btn-play" data-action="play">
                Jogar agora
              </button>
            </div>
          </div>
        </nav>

        <main class="rank-content">
          <header class="rank-header">
            <h1 class="rank-title">Ranking Local</h1>
            <p class="rank-subtitle">
              Os melhores codificadores do sistema. Prove sua lógica e alcance o
              topo.
            </p>
          </header>

          <section class="rank-podium" id="rank-podium">
            <div class="podium-item podium-silver" data-rank="2">
              <span class="podium-label">2nd</span>
              <div class="podium-avatar">
                <img
                  class="podium-avatar-img"
                  src="assets/img/second.png"
                  alt="Silver Trophy" />
              </div>
              <span class="podium-badge">Silver</span>
              <span class="podium-name">---</span>
              <span class="podium-score">0 pts</span>
            </div>

            <div class="podium-item podium-gold" data-rank="1">
              <span class="material-symbols-outlined podium-trophy"
                >emoji_events</span
              >
              <div class="podium-avatar podium-avatar-lg">
                <img
                  class="podium-avatar-img"
                  src="assets/img/first.png"
                  alt="Gold Trophy" />
              </div>
              <span class="podium-badge podium-badge-gold">Master</span>
              <span class="podium-name">---</span>
              <span class="podium-score podium-score-gold">0 pts</span>
            </div>

            <div class="podium-item podium-bronze" data-rank="3">
              <span class="podium-label">3rd</span>
              <div class="podium-avatar">
                <img
                  class="podium-avatar-img"
                  src="assets/img/third.png"
                  alt="Bronze Trophy" />
              </div>
              <span class="podium-badge">Bronze</span>
              <span class="podium-name">---</span>
              <span class="podium-score">0 pts</span>
            </div>
          </section>

          <section class="rank-list-section">
            <div class="rank-list-panel">
              <div class="rank-list-header">
                <span class="rank-col-rank">Rank</span>
                <span class="rank-col-player">Player</span>
                <span class="rank-col-score">Score</span>
              </div>
              <div class="rank-list-body" id="rank-list-body"></div>
              <div class="rank-list-footer">
                <button class="rank-btn-more" id="rank-btn-more">
                  Carregar mais
                  <span class="material-symbols-outlined rank-more-icon"
                    >expand_more</span
                  >
                </button>
              </div>
            </div>
          </section>
        </main>

        <footer class="rank-footer">
          <span class="rank-footer-logo">CodeQuest</span>
        </footer>
      </div>
    </template>

    <svg style="position: absolute; width: 0; height: 0" aria-hidden="true">
      <defs>
        <clipPath id="block-notch" clipPathUnits="objectBoundingBox">
          <path
            d="M 0.14,0 Q 0.10,0 0.10,0.04 L 0.38,0.96 Q 0.38,1 0.40,1 L 0.60,1 Q 0.62,1 0.62,0.96 L 0.90,0.04 Q 0.90,0 0.86,0 Z" />
        </clipPath>
      </defs>
    </svg>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
