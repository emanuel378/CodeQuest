<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cidade da Lógica - Protocolo Autômato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/design-system.css">
  <link rel="stylesheet" href="styles/blocks.css">
  <link rel="stylesheet" href="styles/stage.css">
  <link rel="stylesheet" href="styles/blockly.css">
</head>
<body>

  <header class="top-navbar">
    <div class="nav-brand">
      <h1 class="app-title"><span class="level-indicator">Nível 0</span> Cidade da Lógica</h1>
    </div>
    <div class="nav-controls">
      <div class="progress-container">
        <div class="progress-labels">
          <span>Integridade do Sistema</span>
          <span>60%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill"></div>
        </div>
      </div>
      <div class="star-rating">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
        <span class="material-symbols-outlined" style="color: var(--outline-variant);">star</span>
      </div>
      <button class="menu-btn">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </header>

  <main class="sb-layout">

    <aside class="sb-palette" id="palette"></aside>

    <div class="sb-workspace" id="workspace" tabindex="0"></div>

    <aside class="simulation-panel">
      <div class="sim-header">
        <h3 class="sim-title">Palco de Simulação</h3>
        <span class="status-chip">
          <span class="status-dot"></span>
          <span class="status-text">Pronto</span>
        </span>
      </div>
      <div class="sim-viewport">
        <div class="sim-glow-overlay"></div>
        <div class="sim-grid"></div>
      </div>
      <div class="sim-controls">
        <button class="btn-executar">
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
          EXECUTAR
        </button>
        <button class="btn-pausar">
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pause</span>
          PAUSAR
        </button>
        <button class="btn-limpar">
          <span class="material-symbols-outlined">restart_alt</span>
          LIMPAR
        </button>
      </div>
    </aside>

  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
